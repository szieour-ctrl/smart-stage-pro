[build]
  functions = "netlify/functions"
  publish = "."

[blobs]
  # Netlify Blobs — used for background staging job result storage

[functions]
  node_bundler = "esbuild"

[functions."stage-image"]
  timeout = 26

# CHANGE (July 2026 postmortem): removed the timeout=30 override that was
# here — Netlify hard-caps SYNCHRONOUS functions at 26s regardless of this
# value, and video-job.js no longer does slow work (Claude/ElevenLabs/
# Cloudinary) inline anyway now that narration moved to
# generate-narration-background.js. Back to the platform default.

[functions."generate-narration-background"]
  timeout = 900

[functions."check-narration"]
  timeout = 10

[functions."stage-image-start"]
  timeout = 90

[functions."stage-replicate"]
  timeout = 26

[functions."analyze-room"]
  timeout = 10

[functions."generate-staging-prompt"]
  timeout = 20

[functions."stage-decor8"]
  timeout = 90

[functions."stage-openai"]
  timeout = 30

[functions."stage-openai-background"]
  timeout = 900

[functions."group-spatial-read-background"]
  timeout = 900

[functions."check-spatial-read"]
  timeout = 10

[functions."group-spatial-read"]
  timeout = 900
[functions."check-openai"]
  timeout = 10

[functions."extract-staging-dna"]
  timeout = 15

[functions."serve-image"]
  timeout = 10


[functions."stage-decor8-background"]
  timeout = 90

[functions."check-decor8"]
  timeout = 15

[functions."test-remove-objects"]
  timeout = 26

[functions."remove-objects"]
  timeout = 30

[functions."upscale-image"]
  timeout = 60
  # FIX (Sam's report — 502/OOM on interior Generate Final, exterior
  # worked fine): confirmed via real Netlify function logs — every
  # failure hit exactly ~1022MB (the 1024MB default memory ceiling) while
  # successful runs only needed 278-305MB. This specific interior image's
  # actual decoded pixel dimensions (not necessarily its compressed file
  # size, which looked similar to the successful cases) genuinely need
  # more headroom than the default provides. Sharp/libvips memory usage
  # scales with the image's real pixel count, not its JPEG file size —
  # two images can compress to a similar KB size while having very
  # different native resolutions depending on visual complexity.
  memory = 3008

[functions."upload-original"]
  timeout = 20

[functions."ab723-composite"]
  timeout = 45


[functions."property-search"]
  timeout = 10

[functions."project-manage"]
  timeout = 15

[functions."upload-staged"]
  timeout = 30

[functions."compliance-page"]
  timeout = 15

[functions."download-compliance-zip"]
  timeout = 60

[functions."debit-credit"]
  timeout = 10

# Renders the 10-question AB 723 report as a PDF (July 12, 2026 build).
# external_node_modules is required — pdfkit reads its .afm font-metric
# files via a relative fs path at runtime, and esbuild's default bundling
# breaks that path, so pdfkit must ship un-bundled rather than inlined.
[functions."generate-compliance-pdf"]
  timeout = 15
  external_node_modules = ["pdfkit"]
# ── Domain redirects ─────────────────────────────────────
# Redirect Netlify subdomain to custom domain (301 permanent)
# Must be BEFORE path-based redirects so Netlify processes first
[[redirects]]
  from   = "https://smart-stage-pro.netlify.app/*"
  to     = "https://smartstagepro.com/:splat"
  status = 301
  force  = true

# Redirect www to apex
[[redirects]]
  from   = "https://www.smartstagepro.com/*"
  to     = "https://smartstagepro.com/:splat"
  status = 301
  force  = true

# ── Compliance page routing ──────────────────────────────
[[redirects]]
  from = "/compliance/:projectId"
  to = "/.netlify/functions/compliance-page"
  status = 200
  force = true

[[redirects]]
  from = "/compliance"
  to = "/.netlify/functions/compliance-page"
  status = 200
  force = true

# ── Lead-gen landing pages (added July 11, 2026) ─────────
# Clean subpaths for print/social/email campaigns — actual files are
# agent-compliance.html and builder-compliance.html at the repo root.
# Both already call the backend via relative /.netlify/functions/... paths,
# so no code changes were needed for this to work at these subpaths —
# only needed if these ever move to a fully separate domain instead.
[[redirects]]
  from = "/ab723-check"
  to = "/agent-compliance.html"
  status = 200
  force = true

[[redirects]]
  from = "/builders"
  to = "/builder-compliance.html"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"

[context.production.environment]
  NODE_VERSION = "18"

[functions."generate-qr"]
  timeout = 20

# ── New functions added June 7, 2026 ─────────────────────
[functions."exterior-enhancement-prompt"]
  timeout = 30

[functions."accept-terms"]
  timeout = 15

[functions."create-checkout-session"]
  timeout = 20

[functions."stripe-webhook"]
  timeout = 20

[functions."save-staged-image"]
  timeout = 20

[functions."get-compliance-data"]
  timeout = 30

[functions."update-ab723-disclosed"]
  timeout = 15

[functions."get-user-listings"]
  timeout = 30

# ── Help Agent added June 10, 2026 ───────────────────────
[functions."help-agent"]
  timeout = 30

[functions."help-feedback"]
  timeout = 10
