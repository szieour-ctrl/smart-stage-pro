<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remove Objects Test — Smart Stage AI™</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', serif; background: #f5f3f0; color: #1a1a1a; min-height: 100vh; padding: 40px 20px; }
  h1 { font-size: 1.4rem; font-weight: normal; letter-spacing: 0.05em; text-align: center; margin-bottom: 4px; }
  .subtitle { text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 40px; }
  .card { background: white; border-radius: 8px; padding: 32px; max-width: 900px; margin: 0 auto 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .upload-area { border: 2px dashed #ddd; border-radius: 6px; padding: 40px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
  .upload-area:hover { border-color: #b8a98a; }
  .upload-area input { display: none; }
  .upload-area p { color: #888; font-size: 0.9rem; margin-top: 8px; }
  .btn { background: #1a1a1a; color: white; border: none; padding: 12px 32px; border-radius: 4px; font-size: 0.9rem; letter-spacing: 0.05em; cursor: pointer; transition: background 0.2s; }
  .btn:hover { background: #333; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .btn-wrap { text-align: center; margin-top: 24px; }
  .status { text-align: center; margin-top: 16px; font-size: 0.85rem; color: #888; min-height: 20px; }
  .sbs { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 24px; }
  .sbs-panel h3 { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: #888; margin-bottom: 8px; }
  .sbs-panel img { width: 100%; border-radius: 4px; display: block; }
  .error { background: #fdf0f0; border: 1px solid #f5c0c0; color: #c0392b; padding: 12px 16px; border-radius: 4px; font-size: 0.85rem; margin-top: 16px; }
  .preview-img { max-width: 100%; max-height: 200px; border-radius: 4px; margin-top: 12px; display: none; }
  .tag { display: inline-block; background: #f0ece4; color: #666; font-size: 0.75rem; padding: 3px 10px; border-radius: 20px; margin-top: 8px; }
</style>
</head>
<body>

<h1>Smart Stage AI™ — Remove Objects Test</h1>
<p class="subtitle">Decor8 /remove_objects_from_room · Occupied listing → Empty room</p>

<div class="card">
  <div class="upload-area" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept="image/jpeg,image/png" onchange="handleFile(event)">
    <div style="font-size:2rem;">📷</div>
    <p>Click to upload occupied room photo</p>
    <p style="font-size:0.75rem;margin-top:4px;">JPEG or PNG</p>
  </div>
  <img id="previewImg" class="preview-img">

  <div class="btn-wrap">
    <button class="btn" id="runBtn" onclick="runRemove()" disabled>Remove Objects</button>
  </div>
  <div class="status" id="status"></div>
  <div id="errorBox"></div>
</div>

<div class="card" id="resultCard" style="display:none;">
  <div class="sbs">
    <div class="sbs-panel">
      <h3>Original — Occupied</h3>
      <img id="originalImg">
    </div>
    <div class="sbs-panel">
      <h3>Result — Objects Removed</h3>
      <img id="resultImg">
    </div>
  </div>
  <div style="text-align:center;margin-top:16px;">
    <span class="tag" id="sizeTag"></span>
  </div>
</div>

<script>
let currentBase64 = null;
let currentMime = null;

function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  currentMime = file.type;
  const reader = new FileReader();
  reader.onload = (e) => {
    currentBase64 = e.target.result.split(',')[1];
    const preview = document.getElementById('previewImg');
    preview.src = e.target.result;
    preview.style.display = 'block';
    document.getElementById('runBtn').disabled = false;
    document.getElementById('status').textContent = 'Photo loaded — ready to remove objects';
  };
  reader.readAsDataURL(file);
}

async function runRemove() {
  if (!currentBase64) return;
  const btn = document.getElementById('runBtn');
  const status = document.getElementById('status');
  const errorBox = document.getElementById('errorBox');

  btn.disabled = true;
  errorBox.innerHTML = '';
  status.textContent = 'Uploading to ImgBB...';

  const start = Date.now();

  try {
    status.textContent = 'Calling Decor8 remove objects — please wait ~30 seconds...';

    const res = await fetch('/.netlify/functions/test-remove-objects', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageBase64: currentBase64, mimeType: currentMime })
    });

    const data = await res.json();
    const elapsed = ((Date.now() - start) / 1000).toFixed(1);

    if (!res.ok || data.error) {
      errorBox.innerHTML = `<div class="error">Error: ${data.error || res.status}</div>`;
      status.textContent = '';
      btn.disabled = false;
      return;
    }

    // Show results
    document.getElementById('originalImg').src = `data:${currentMime};base64,${currentBase64}`;
    document.getElementById('resultImg').src = `data:image/jpeg;base64,${data.removedBase64}`;
    document.getElementById('resultCard').style.display = 'block';
    document.getElementById('sizeTag').textContent = `${elapsed}s · ${Math.round(data.removedBase64.length/1024)}KB result`;
    status.textContent = `Complete in ${elapsed}s`;
    document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });

  } catch(err) {
    errorBox.innerHTML = `<div class="error">Error: ${err.message}</div>`;
    status.textContent = '';
  }

  btn.disabled = false;
}
</script>

</body>
</html>
